{% extends 'books/base.html' %}

{% block title %}Error{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger mt-5">
            <div class="card-body text-center">
                <div class="mb-4 text-danger">
                    <i class="bi bi-exclamation-triangle-fill" style="font-size: 4rem;"></i>
                </div>
                <h2 class="card-title">Oops!</h2>
                <p class="card-text lead">{{ message }}</p>
                <a href="{% url 'book_list' %}" class="btn btn-primary mt-3">
                    <i class="bi bi-house-door"></i> Go to Home
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
