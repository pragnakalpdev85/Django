{% extends 'books/base.html' %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-warning mt-5">
            <div class="card-body text-center">
                <div class="mb-4 text-warning">
                    <i class="bi bi-search" style="font-size: 4rem;"></i>
                </div>
                <h2 class="card-title">Page Not Found</h2>
                <p class="card-text lead">The page you are looking for does not exist or has been moved.</p>
                <a href="{% url 'book_list' %}" class="btn btn-primary mt-3">
                    <i class="bi bi-house-door"></i> Go to Home
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
