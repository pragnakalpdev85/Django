name: Django Test Pipeline

on:
  push:
    branches: [ main ]

env:
  SECRET_KEY: "!0cf8lw9)uzf&@ofel^vf2k*2q5w1&p3w8h21w=h6rd357a$w@"
  DEBUG: "TRUE"
  ALLOWED_HOSTS: "localhost,127.0.0.1"

  DB_NAME: test_db
  DB_USER: postgres
  DB_PASSWORD: postgres
  DB_HOST: localhost
  DB_PORT: 5432

jobs: 
  build:
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
          POSTGRES_USER: ${{ env.DB_USER }}
          POSTGRES_DB: ${{ env.DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set Up Python
      uses: actions/setup-python@v6 
      with:
        python-version: '3.11'

    - name: Installing dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run migrations
      env:
        SECRET_KEY: "!0cf8lw9)uzf&@ofel^vf2k*2q5w1&p3w8h21w=h6rd357a$w@"
        DEBUG: "TRUE"
        ALLOWED_HOSTS: "localhost,127.0.0.1"
  
        DB_NAME: test_db
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_HOST: localhost
        DB_PORT: 5432

      run: |
        cd Book_Library_System/library  
        python manage.py migrate

    - name: Run Tests
      run: |
        cd Book_Library_System/library/
        pytest

    
